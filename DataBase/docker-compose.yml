version: "3.9"

services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: observatorio_sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=StrongPassword123!
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - observatorio_network

  postgres:
    image: postgres:15
    container_name: observatorio_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: observatorio_public
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - observatorio_network

  redis:
    image: redis:7
    container_name: observatorio_redis
    ports:
      - "6379:6379"
    networks:
      - observatorio_network

  chromadb:
    image: chromadb/chroma
    container_name: observatorio_chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - observatorio_network

volumes:
  sqlserver_data:
  postgres_data:
  chroma_data:

networks:
  observatorio_network: